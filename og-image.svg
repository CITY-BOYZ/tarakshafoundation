<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#0d1a26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a4a6b"/>
      <stop offset="100%" style="stop-color:#2a6fa8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(26,74,107,0.15)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow orb -->
  <circle cx="900" cy="200" r="300" fill="rgba(26,74,107,0.12)" filter="url(#glow)"/>
  <circle cx="150" cy="500" r="200" fill="rgba(184,134,11,0.06)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="3" height="270" fill="url(#accent)" rx="2"/>

  <!-- Foundation name -->
  <text x="110" y="230" font-family="Georgia, serif" font-size="18" font-weight="400" letter-spacing="6" fill="rgba(255,255,255,0.4)" text-transform="uppercase">TARAKSHA FOUNDATION</text>

  <!-- Main headline -->
  <text x="110" y="310" font-family="Georgia, serif" font-size="54" font-weight="300" fill="white">Advancing Healthcare,</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="54" font-weight="300" fill="white">Research &amp;</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="54" font-style="italic" fill="#2a6fa8">Sustainable Innovation</text>

  <!-- Subtext -->
  <text x="110" y="500" font-family="Arial, sans-serif" font-size="16" font-weight="300" fill="rgba(255,255,255,0.4)">Cancer Research · Public Health · IoT Hygiene Technology · India</text>

  <!-- Domain pill -->
  <rect x="110" y="540" width="280" height="36" rx="18" fill="rgba(26,74,107,0.4)" stroke="rgba(42,111,168,0.4)" stroke-width="1"/>
  <text x="250" y="563" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">tarakshafoundation.org</text>

  <!-- Abstract data viz dots (right side) -->
  <g fill="rgba(42,111,168,0.3)">
    <circle cx="950" cy="150" r="4"/>
    <circle cx="1010" cy="200" r="4"/>
    <circle cx="1070" cy="170" r="4"/>
    <circle cx="1130" cy="220" r="4"/>
    <circle cx="950" cy="280" r="4"/>
    <circle cx="1010" cy="320" r="4"/>
    <circle cx="1070" cy="290" r="4"/>
    <circle cx="1130" cy="340" r="4"/>
    <circle cx="950" cy="400" r="4"/>
    <circle cx="1010" cy="440" r="4"/>
    <circle cx="1070" cy="410" r="4"/>
    <circle cx="1130" cy="460" r="4"/>
  </g>
  <g stroke="rgba(42,111,168,0.2)" stroke-width="1" fill="none">
    <polyline points="950,150 1010,200 1070,170 1130,220"/>
    <polyline points="950,280 1010,320 1070,290 1130,340"/>
    <polyline points="950,400 1010,440 1070,410 1130,460"/>
  </g>
  <g fill="rgba(212,160,23,0.6)">
    <circle cx="1070" cy="170" r="6"/>
    <circle cx="1010" cy="320" r="6"/>
    <circle cx="1130" cy="460" r="6"/>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
